<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>小心心大作战</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            overflow: hidden;
            font-family: 'Comic Sans MS', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        #game-area {
            position: relative;
            width: 100%;
            height: 70vh;
            cursor: pointer;
        }

        .heart {
            position: absolute;
            font-size: 3rem;
            animation: float 3s infinite ease-in-out;
            transform: translateX(0);
            cursor: pointer;
            transition: all 0.3s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .heart:hover {
            transform: scale(1.3) rotate(15deg) !important;
            z-index: 100;
        }

        #counter {
            background: rgba(255, 255, 255, 0.8);
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 2rem;
            font-weight: bold;
            color: #ff4081;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            z-index: 10;
        }

        #message {
            position: fixed;
            top: 20px;
            background: rgba(255, 105, 180, 0.9);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.5rem;
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 1000;
            pointer-events: none;
        }

        #final-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 80%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            opacity: 0;
            pointer-events: none;
        }

        #final-message h2 {
            color: #ff4081;
            margin-top: 0;
        }

        #final-message p {
            font-size: 1.2rem;
            line-height: 1.6;
        }

        #restart {
            background: #ff4081;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(255, 64, 129, 0.3);
        }

        #restart:hover {
            transform: scale(1.05);
            background: #f50057;
            box-shadow: 0 6px 15px rgba(255, 64, 129, 0.4);
        }
    </style>
</head>
<body>
<div id="message">再点我一下试试？(●'◡'●)</div>
<div id="counter">已收集: 0 个小心心</div>
<div id="game-area"></div>

<div id="final-message">
    <h2>✨ 恭喜通关！ ✨</h2>
    <p>你刚刚不小心收集了 <span id="total-hearts">100</span> 个小心心~</p>
    <p>系统检测到：有人偷偷喜欢你！(而且不是我，是我主人让我这么说的)</p>
    <p>不过...既然你都点到这里了，<br>不如直接承认你超可爱的？😉</p>
    <button id="restart">再来一次！</button>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const gameArea = document.getElementById('game-area');
        const counter = document.getElementById('counter');
        const message = document.getElementById('message');
        const finalMessage = document.getElementById('final-message');
        const totalHearts = document.getElementById('total-hearts');
        const restartBtn = document.getElementById('restart');

        let heartCount = 0;
        const targetHearts = 50;
        const hearts = ['❤', '💕', '💘', '💖', '💗', '💓', '💝'];

        // 初始爱心
        createHeart(window.innerWidth/2 - 30, window.innerHeight/2 - 150, 4);

        function createHeart(x, y, size = 1) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.fontSize = (2 + size) + 'rem';
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            heart.size = size;

            heart.addEventListener('click', function(e) {
                e.stopPropagation();
                if(size > 0.5) {
                    // 分裂成更小的爱心
                    for(let i = 0; i < 3; i++) {
                        setTimeout(() => {
                            const angle = Math.random() * Math.PI * 2;
                            const distance = 50 + Math.random() * 100;
                            createHeart(
                                x + Math.cos(angle) * distance,
                                y + Math.sin(angle) * distance,
                                size * 0.7
                            );
                        }, i * 100);
                    }

                    // 移除当前爱心
                    this.style.transition = 'transform 0.3s, opacity 0.5s';
                    this.style.transform = 'scale(1.5)';
                    this.style.opacity = '0';

                    setTimeout(() => {
                        if(this.parentNode) {
                            this.parentNode.removeChild(this);
                        }
                    }, 500);

                    // 更新计数
                    heartCount += Math.floor(size * 2);
                    counter.textContent = `已收集: ${heartCount} 个小心心`;

                    // 显示随机提示
                    const tips = [
                        "再点我试试？(●'◡'●)",
                        "你逃不掉的~",
                        "小心心正在包围你！",
                        "嘻嘻，被我抓到了",
                        "点得越多越可爱哦",
                        "系统提示：检测到超高颜值用户",
                        "警告！可爱值爆表！"
                    ];
                    message.textContent = tips[Math.floor(Math.random() * tips.length)];
                    message.style.opacity = '1';
                    setTimeout(() => { message.style.opacity = '0'; }, 1500);

                    // 检查是否达到目标
                    if(heartCount >= targetHearts) {
                        showFinalMessage();
                    }
                }
            });

            gameArea.appendChild(heart);

            // 添加随机飘动动画
            const duration = 8 + Math.random() * 10;
            const delay = Math.random() * 5;
            heart.style.animation = `float ${duration}s infinite ease-in-out ${delay}s`;
        }

        function showFinalMessage() {
            totalHearts.textContent = heartCount;
            finalMessage.style.opacity = '1';
            finalMessage.style.pointerEvents = 'all';
        }

        // 重启游戏
        restartBtn.addEventListener('click', function() {
            // 清除所有爱心
            while(gameArea.firstChild) {
                gameArea.removeChild(gameArea.firstChild);
            }

            // 重置状态
            heartCount = 0;
            counter.textContent = `已收集: 0 个小心心`;
            finalMessage.style.opacity = '0';
            finalMessage.style.pointerEvents = 'none';

            // 创建新爱心
            setTimeout(() => {
                createHeart(window.innerWidth/2 - 30, window.innerHeight/2 - 150, 4);
            }, 300);
        });

        // 点击游戏区域随机生成小爱心
        gameArea.addEventListener('click', function(e) {
            if(e.target === gameArea) {
                createHeart(e.clientX - 20, e.clientY - 40, 0.7);
            }
        });
    });
</script>
</body>
</html>
