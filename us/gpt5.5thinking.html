<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>开心补给站</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
            background:
                    radial-gradient(circle at 15% 20%, rgba(255, 255, 255, 0.9), transparent 28%),
                    radial-gradient(circle at 85% 15%, rgba(255, 219, 239, 0.85), transparent 26%),
                    radial-gradient(circle at 50% 85%, rgba(255, 246, 185, 0.65), transparent 28%),
                    linear-gradient(135deg, #ffd6e8, #d8e7ff 48%, #fff3d6);
            color: #5b315f;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .floating-bg span {
            position: absolute;
            bottom: -80px;
            font-size: 26px;
            opacity: 0.45;
            animation: floatUp linear infinite;
            user-select: none;
            pointer-events: none;
            filter: drop-shadow(0 6px 12px rgba(255, 105, 180, 0.18));
        }

        @keyframes floatUp {
            from {
                transform: translateY(0) rotate(0deg) scale(0.8);
                opacity: 0;
            }
            12% { opacity: 0.55; }
            to {
                transform: translateY(-115vh) rotate(360deg) scale(1.35);
                opacity: 0;
            }
        }

        .card {
            position: relative;
            width: min(92vw, 760px);
            min-height: 560px;
            padding: 38px 32px;
            border-radius: 36px;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(18px);
            box-shadow: 0 28px 80px rgba(148, 95, 144, 0.24);
            border: 1px solid rgba(255,255,255,0.72);
            text-align: center;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 12px;
            border-radius: 28px;
            border: 1px dashed rgba(255, 120, 172, 0.38);
            pointer-events: none;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 16px;
            border-radius: 999px;
            background: rgba(255, 239, 248, 0.92);
            color: #d6538d;
            font-weight: 700;
            font-size: 14px;
            box-shadow: inset 0 0 0 1px rgba(255, 149, 194, 0.25);
            margin-bottom: 18px;
        }

        h1 {
            font-size: clamp(32px, 6vw, 58px);
            line-height: 1.06;
            letter-spacing: -1px;
            margin-bottom: 16px;
            color: #73356d;
            text-shadow: 0 8px 24px rgba(255, 114, 184, 0.2);
        }

        .sub {
            font-size: clamp(16px, 2.5vw, 20px);
            line-height: 1.8;
            color: #7b587a;
            margin: 0 auto 22px;
            max-width: 560px;
        }

        .avatar {
            width: 126px;
            height: 126px;
            margin: 18px auto 8px;
            border-radius: 38px;
            background: linear-gradient(145deg, #fff7fb, #ffe0ef);
            display: grid;
            place-items: center;
            font-size: 64px;
            cursor: pointer;
            box-shadow: 0 18px 35px rgba(255, 103, 172, 0.2), inset 0 0 0 1px rgba(255,255,255,0.7);
            transition: 0.25s ease;
            user-select: none;
        }

        .avatar:hover {
            transform: translateY(-5px) rotate(-3deg) scale(1.04);
        }

        .speech {
            min-height: 60px;
            margin: 18px auto 22px;
            padding: 14px 18px;
            max-width: 560px;
            border-radius: 22px;
            background: rgba(255, 249, 252, 0.88);
            color: #74446f;
            font-size: 18px;
            line-height: 1.55;
            box-shadow: 0 10px 28px rgba(159, 101, 158, 0.12);
            position: relative;
        }

        .speech::before {
            content: "";
            position: absolute;
            top: -10px;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translateX(-50%) rotate(45deg);
            background: rgba(255, 249, 252, 0.88);
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 18px;
            min-height: 70px;
        }

        button {
            border: 0;
            cursor: pointer;
            font-family: inherit;
            font-weight: 800;
            font-size: 17px;
            border-radius: 999px;
            padding: 15px 24px;
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            user-select: none;
        }

        button:hover {
            transform: translateY(-3px);
            filter: brightness(1.03);
        }

        .yes {
            color: white;
            background: linear-gradient(135deg, #ff74b8, #ff9a76);
            box-shadow: 0 14px 28px rgba(255, 91, 154, 0.34);
        }

        .gift {
            color: #8a4d15;
            background: linear-gradient(135deg, #fff1a8, #ffd28a);
            box-shadow: 0 14px 28px rgba(255, 190, 87, 0.26);
        }

        .no {
            color: #73516d;
            background: #ffffff;
            box-shadow: 0 12px 24px rgba(108, 78, 116, 0.14);
            position: relative;
        }

        .meter-wrap {
            margin: 24px auto 0;
            max-width: 520px;
            text-align: left;
        }

        .meter-top {
            display: flex;
            justify-content: space-between;
            color: #8b5c86;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .meter {
            height: 16px;
            border-radius: 999px;
            background: rgba(119, 86, 124, 0.12);
            overflow: hidden;
            box-shadow: inset 0 2px 8px rgba(120, 84, 126, 0.12);
        }

        .bar {
            height: 100%;
            width: 8%;
            border-radius: 999px;
            background: linear-gradient(90deg, #ff72b6, #ffcc73, #fff0a8);
            transition: width 0.45s cubic-bezier(.34,1.56,.64,1);
        }

        .mini-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 24px auto 0;
            max-width: 560px;
        }

        .mini {
            border-radius: 22px;
            padding: 15px 10px;
            background: rgba(255,255,255,0.58);
            box-shadow: 0 10px 22px rgba(119, 85, 128, 0.1);
            cursor: pointer;
            transition: 0.22s ease;
            min-height: 86px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            user-select: none;
        }

        .mini:hover {
            transform: translateY(-5px) rotate(1deg);
            background: rgba(255,255,255,0.86);
        }

        .mini b {
            font-size: 27px;
        }

        .mini span {
            font-size: 13px;
            color: #7e597f;
            font-weight: 800;
        }

        .secret {
            position: absolute;
            top: 18px;
            right: 20px;
            width: 46px;
            height: 46px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.56);
            cursor: pointer;
            font-size: 23px;
            transition: 0.22s ease;
            box-shadow: 0 8px 18px rgba(124, 75, 130, 0.12);
            z-index: 4;
        }

        .secret:hover {
            transform: rotate(18deg) scale(1.08);
        }

        .toast {
            position: fixed;
            left: 50%;
            top: 24px;
            transform: translateX(-50%) translateY(-120px);
            z-index: 100;
            padding: 14px 20px;
            border-radius: 999px;
            background: rgba(255,255,255,0.9);
            color: #78396d;
            font-weight: 900;
            box-shadow: 0 16px 45px rgba(93, 62, 102, 0.2);
            transition: 0.35s cubic-bezier(.34,1.56,.64,1);
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .heart, .spark {
            position: fixed;
            pointer-events: none;
            z-index: 99;
            animation: pop 1.1s ease-out forwards;
            font-size: 24px;
        }

        @keyframes pop {
            0% {
                transform: translate(-50%, -50%) scale(0.4) rotate(0deg);
                opacity: 0;
            }
            12% { opacity: 1; }
            100% {
                transform: translate(var(--x), var(--y)) scale(1.4) rotate(220deg);
                opacity: 0;
            }
        }

        .shake {
            animation: shake 0.35s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-5px); }
        }

        .modal {
            position: fixed;
            inset: 0;
            display: none;
            place-items: center;
            z-index: 120;
            background: rgba(57, 35, 66, 0.28);
            backdrop-filter: blur(8px);
            padding: 20px;
        }

        .modal.show {
            display: grid;
        }

        .letter {
            max-width: 520px;
            border-radius: 32px;
            padding: 30px;
            background: rgba(255,255,255,0.94);
            box-shadow: 0 28px 80px rgba(65, 32, 76, 0.22);
            text-align: center;
            color: #6f426d;
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from { transform: scale(0.78); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .letter h2 {
            font-size: 30px;
            margin-bottom: 12px;
        }

        .letter p {
            line-height: 1.8;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .close {
            background: linear-gradient(135deg, #a987ff, #ff89c7);
            color: white;
            box-shadow: 0 12px 24px rgba(169, 135, 255, 0.28);
        }

        .footer-tip {
            margin-top: 18px;
            font-size: 13px;
            color: rgba(117, 76, 116, 0.7);
        }

        @media (max-width: 560px) {
            body { overflow-y: auto; }
            .card { min-height: auto; padding: 32px 18px; }
            .mini-panel { grid-template-columns: 1fr; }
            .buttons { gap: 10px; }
            button { font-size: 15px; padding: 13px 18px; }
            .avatar { width: 104px; height: 104px; font-size: 54px; }
            .secret { top: 12px; right: 12px; }
        }
    </style>
</head>
<body>
<div class="floating-bg" id="floatingBg"></div>
<div class="toast" id="toast">今日开心值 +1</div>

<main class="card" id="card">
    <div class="secret" id="secret" title="点我有彩蛋">🎀</div>
    <div class="badge">💌 女孩开心补给站 · 今日限定</div>
    <h1>请查收一份<br>超甜开心魔法</h1>
    <p class="sub">点击小猫、抽签、拆礼物、挑战按钮。只要你点一下，这个页面就会努力把你逗笑一下。</p>

    <div class="avatar" id="avatar" title="戳戳我">🐱</div>
    <div class="speech" id="speech">小猫检测到：你今天的可爱值已经超标，建议立刻奖励一杯奶茶。</div>

    <div class="buttons">
        <button class="yes" id="yesBtn">我承认我很可爱 💗</button>
        <button class="gift" id="giftBtn">拆一个小礼物 🎁</button>
        <button class="no" id="noBtn">才没有呢 🙈</button>
    </div>

    <div class="meter-wrap">
        <div class="meter-top">
            <span>开心能量</span>
            <span id="scoreText">8%</span>
        </div>
        <div class="meter"><div class="bar" id="bar"></div></div>
    </div>

    <section class="mini-panel">
        <div class="mini" data-action="fortune"><b>🔮</b><span>今日好运签</span></div>
        <div class="mini" data-action="compliment"><b>🌷</b><span>随机夸夸机</span></div>
        <div class="mini" data-action="challenge"><b>😆</b><span>笑容挑战</span></div>
    </section>

    <div class="footer-tip">隐藏玩法：试试去点那个“才没有呢”按钮，它有点调皮。</div>
</main>

<div class="modal" id="modal">
    <div class="letter">
        <h2 id="modalTitle">🎉 恭喜你</h2>
        <p id="modalText">你获得了今日份快乐。</p>
        <button class="close" id="closeModal">收下啦</button>
    </div>
</div>

<script>
    const speech = document.getElementById('speech');
    const avatar = document.getElementById('avatar');
    const yesBtn = document.getElementById('yesBtn');
    const giftBtn = document.getElementById('giftBtn');
    const noBtn = document.getElementById('noBtn');
    const card = document.getElementById('card');
    const bar = document.getElementById('bar');
    const scoreText = document.getElementById('scoreText');
    const toast = document.getElementById('toast');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const modalText = document.getElementById('modalText');
    const closeModal = document.getElementById('closeModal');
    const secret = document.getElementById('secret');

    let score = 8;
    let noCount = 0;
    let secretCount = 0;

    const compliments = [
        '你不是普通可爱，是那种让路过的小狗都想回头看的可爱。',
        '今天的你像刚出炉的小蛋糕，软乎乎还自带甜味。',
        '系统提示：附近出现一位高颜值玩家，请大家自觉让路。',
        '你一出现，连空气都自动调成了粉色滤镜。',
        '你今天的状态：漂亮、聪明、会发光，还有一点点迷人。',
        '小猫认真鉴定过了：你是今日限定版宝藏女孩。',
        '你笑一下，页面都想自动加班给你放烟花。',
        '警告：你的可爱指数已超过本网页承受范围。'
    ];

    const fortunes = [
        '今日好运：会遇到一件让你嘴角偷偷上扬的小事。',
        '今日关键词：被偏爱、被夸奖、被投喂。',
        '今日宜：喝奶茶、拍好看照片、接受赞美。',
        '今日隐藏好运：有人正在偷偷觉得你很特别。',
        '今日幸运色：看见你会心动的那种粉。',
        '今日运势：快乐正在排队向你靠近。'
    ];

    const gifts = [
        ['🎁 小礼物已打开', '获得：免生气券一张。使用后，对方必须立刻哄你。'],
        ['🍰 小礼物已打开', '获得：甜甜蛋糕一块。热量由本网页偷偷承担。'],
        ['🌙 小礼物已打开', '获得：今晚好梦卡。梦里全是开心的事情。'],
        ['💎 小礼物已打开', '获得：闪闪发光buff。持续时间：一整天。'],
        ['🧸 小礼物已打开', '获得：抱抱券一张。有效期：永远。']
    ];

    function randomItem(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function setSpeech(text) {
        speech.textContent = text;
        speech.classList.remove('shake');
        void speech.offsetWidth;
        speech.classList.add('shake');
    }

    function addScore(num) {
        score = Math.min(100, score + num);
        bar.style.width = score + '%';
        scoreText.textContent = score + '%';
        if (score >= 100) {
            openModal('💖 开心值满格', '恭喜！你已经成功把这个小网页逗到冒粉色泡泡啦。今天请务必开开心心。');
            burst(window.innerWidth / 2, window.innerHeight / 2, 46);
        }
    }

    function showToast(text) {
        toast.textContent = text;
        toast.classList.add('show');
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => toast.classList.remove('show'), 1600);
    }

    function burst(x, y, count = 22) {
        const emojis = ['💗', '💕', '💖', '✨', '🌷', '⭐', '🎀', '🫧'];
        for (let i = 0; i < count; i++) {
            const el = document.createElement('div');
            el.className = Math.random() > 0.45 ? 'heart' : 'spark';
            el.textContent = randomItem(emojis);
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.setProperty('--x', (Math.random() * 280 - 140) + 'px');
            el.style.setProperty('--y', (Math.random() * -260 - 40) + 'px');
            el.style.animationDuration = (0.8 + Math.random() * 0.8) + 's';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1700);
        }
    }

    function openModal(title, text) {
        modalTitle.textContent = title;
        modalText.textContent = text;
        modal.classList.add('show');
    }

    function moveNoButton() {
        noCount++;
        const rect = card.getBoundingClientRect();
        const btnRect = noBtn.getBoundingClientRect();
        const maxX = Math.max(20, rect.width - btnRect.width - 40);
        const maxY = Math.max(20, rect.height - btnRect.height - 40);
        noBtn.style.position = 'absolute';
        noBtn.style.left = (20 + Math.random() * maxX) + 'px';
        noBtn.style.top = (120 + Math.random() * (maxY - 80)) + 'px';
        noBtn.style.zIndex = 10;

        const lines = [
            '不许谦虚！小猫已经把证据截图保存了。',
            '抓不到我吧？承认可爱才可以通关。',
            '这个按钮已经叛变了，它也觉得你可爱。',
            '再点我，我就要替你承认可爱了。',
            '好啦好啦，你就是很可爱嘛。'
        ];
        setSpeech(lines[Math.min(noCount - 1, lines.length - 1)]);
        showToast('谦虚失败，可爱 +5');
        addScore(5);
        burst(btnRect.left + btnRect.width / 2, btnRect.top + btnRect.height / 2, 10);

        if (noCount >= 6) {
            noBtn.textContent = '好吧我确实很可爱 😳';
            noBtn.className = 'yes';
        }
    }

    avatar.addEventListener('click', (e) => {
        const faces = ['🐱', '😽', '🐰', '🦊', '🐹', '🥰'];
        avatar.textContent = randomItem(faces);
        setSpeech(randomItem(compliments));
        showToast('小猫夸夸发射成功');
        addScore(9);
        burst(e.clientX, e.clientY, 18);
    });

    yesBtn.addEventListener('click', (e) => {
        setSpeech('非常正确！自信的女孩最好看，今天的你直接满分出场。');
        showToast('自信暴击，开心 +18');
        addScore(18);
        burst(e.clientX, e.clientY, 30);
    });

    giftBtn.addEventListener('click', (e) => {
        const gift = randomItem(gifts);
        openModal(gift[0], gift[1]);
        showToast('礼物掉落成功');
        addScore(14);
        burst(e.clientX, e.clientY, 26);
    });

    noBtn.addEventListener('mouseenter', moveNoButton);
    noBtn.addEventListener('click', (e) => {
        if (noCount >= 6) {
            setSpeech('通关成功！你终于承认啦，小猫很欣慰。');
            addScore(22);
            burst(e.clientX, e.clientY, 36);
        } else {
            moveNoButton();
        }
    });

    document.querySelectorAll('.mini').forEach(item => {
        item.addEventListener('click', (e) => {
            const action = item.dataset.action;
            if (action === 'fortune') {
                setSpeech(randomItem(fortunes));
                showToast('好运签已送达');
                addScore(10);
            }
            if (action === 'compliment') {
                setSpeech(randomItem(compliments));
                showToast('夸夸机启动');
                addScore(11);
            }
            if (action === 'challenge') {
                const tasks = [
                    '笑容挑战：请立刻笑 3 秒，失败也算可爱。',
                    '眨眼挑战：眨一下眼，就算你给这个页面放电了。',
                    '公主挑战：接下来 10 秒，请允许自己理直气壮地漂亮。',
                    '撒娇挑战：对屏幕说一句“我今天也太棒了吧”。'
                ];
                setSpeech(randomItem(tasks));
                showToast('挑战已开启');
                addScore(12);
            }
            burst(e.clientX, e.clientY, 18);
        });
    });

    secret.addEventListener('click', (e) => {
        secretCount++;
        secret.style.transform = `rotate(${secretCount * 45}deg) scale(1.08)`;
        const secrets = [
            '彩蛋 1：这个网页最喜欢的人，正在屏幕前。',
            '彩蛋 2：你点这里的时候，小猫偷偷比了个心。',
            '彩蛋 3：今日隐藏任务——把不开心全部丢掉。',
            '终极彩蛋：你已经解锁“被宠爱模式”。'
        ];
        setSpeech(secrets[Math.min(secretCount - 1, secrets.length - 1)]);
        showToast('发现隐藏彩蛋');
        addScore(16);
        burst(e.clientX, e.clientY, 32);
        if (secretCount >= 4) {
            openModal('🎀 被宠爱模式已开启', '从现在开始，所有小烦恼都要排队退散。你负责漂亮开心，其他交给好运。');
        }
    });

    closeModal.addEventListener('click', () => modal.classList.remove('show'));
    modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.classList.remove('show');
    });

    document.addEventListener('click', (e) => {
        if (Math.random() > 0.72) burst(e.clientX, e.clientY, 8);
    });

    function initFloatingBg() {
        const bg = document.getElementById('floatingBg');
        const icons = ['💗', '✨', '🌸', '🎀', '🫧', '⭐', '💕'];
        for (let i = 0; i < 24; i++) {
            const span = document.createElement('span');
            span.textContent = randomItem(icons);
            span.style.left = Math.random() * 100 + 'vw';
            span.style.animationDuration = (8 + Math.random() * 10) + 's';
            span.style.animationDelay = (-Math.random() * 12) + 's';
            span.style.fontSize = (18 + Math.random() * 28) + 'px';
            bg.appendChild(span);
        }
    }

    initFloatingBg();
    setTimeout(() => {
        showToast('欢迎进入开心补给站');
        bar.style.width = score + '%';
    }, 400);
</script>
</body>
</html>
