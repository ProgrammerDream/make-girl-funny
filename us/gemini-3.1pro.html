<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给你看个好玩的 ✨</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #ffeef2;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }

        h1 {
            color: #ff4d6d;
            font-size: 2.5rem;
            margin-bottom: 50px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .container {
            position: relative;
            width: 100%;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: absolute;
        }

        #yes-btn {
            background-color: #ff4d6d;
            color: white;
            transform: translateX(-80px); /* 初始偏移，留出空间 */
        }

        #yes-btn:hover {
            transform: translateX(-80px) scale(1.1);
            background-color: #ff758f;
        }

        #no-btn {
            background-color: #adb5bd;
            color: white;
            transform: translateX(80px);
        }

        /* 成功后的弹窗 */
        #modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 0 50px rgba(0,0,0,0.2);
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 999;
        }
    </style>
</head>
<body>

    <h1>周末请你喝奶茶，好不好？☕</h1>

    <div class="container">
        <button id="yes-btn" onclick="celebrate()">好呀</button>
        <button id="no-btn" onmouseover="moveButton(this)" onclick="moveButton(this)">不行</button>
    </div>

    <div class="overlay" id="overlay"></div>
    <div id="modal">
        <h2 style="color: #ff4d6d;">我就知道你会答应的！❤️</h2>
        <p>发截图给我，不许反悔哦~</p>
        <button onclick="closeModal()" style="position: static; background: #ff4d6d; color: white;">收到！</button>
    </div>

    <script>
        function moveButton(btn) {
            // 获取窗口宽高，留出边界
            const x = Math.random() * (window.innerWidth - btn.offsetWidth - 20);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight - 20);
            
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            btn.style.transform = 'none'; // 移动时取消初始的translateX
        }

        function celebrate() {
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            
            // 简单的爱心纸屑效果
            for(let i=0; i<30; i++) {
                createHeart();
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'fixed';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
            heart.style.transition = `all ${Math.random() * 2 + 3}s linear`;
            heart.style.zIndex = '1001';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.style.top = '-10vh';
                heart.style.opacity = '0';
            }, 100);

            setTimeout(() => heart.remove(), 5000);
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
