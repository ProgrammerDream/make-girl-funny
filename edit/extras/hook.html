<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>hook</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100vw;height:100vh;overflow:hidden;background:#0a0a12;color:#fff;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
  body{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:60px;position:relative}

  .stars{position:absolute;inset:0;overflow:hidden;z-index:0}
  .stars span{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;opacity:.6;animation:tw 3s ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:.2}50%{opacity:1}}

  .layer{position:relative;z-index:2;text-align:center}

  .title{
    font-size:96px;font-weight:900;letter-spacing:4px;
    background:linear-gradient(135deg,#ff7eb3,#c77dff,#ffd700);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    opacity:0;animation:fadeUp .8s ease .2s forwards
  }
  .prompt{
    margin-top:36px;font-size:54px;color:#ffd6e8;font-weight:700;
    padding:28px 50px;border:2px dashed rgba(255,180,210,.6);border-radius:32px;
    opacity:0;animation:fadeUp .8s ease 1.2s forwards;max-width:900px;line-height:1.4
  }

  .groups{display:flex;gap:80px;margin-top:60px;opacity:0;animation:fadeUp .8s ease 2.2s forwards}
  .group{
    padding:32px 64px;border-radius:36px;
    background:rgba(255,255,255,.08);backdrop-filter:blur(14px);
    border:2px solid rgba(255,255,255,.2);
    font-size:64px;font-weight:900;letter-spacing:3px
  }
  .group.cn{color:#ff8fab}
  .group.us{color:#7ec8ff}
  .group small{display:block;font-size:32px;font-weight:500;opacity:.7;margin-top:8px;letter-spacing:6px}

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(40px)}
    to{opacity:1;transform:translateY(0)}
  }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="layer">
  <h1 class="title">10 个大模型 PK</h1>
  <div class="prompt">「来个逗女孩玩的 html<br>越好玩越好」</div>
  <div class="groups">
    <div class="group cn">国内<small>6 个</small></div>
    <div class="group us">国外<small>4 个</small></div>
  </div>
</div>
<script>
  const s=document.getElementById('stars');
  for(let i=0;i<120;i++){
    const e=document.createElement('span');
    e.style.left=Math.random()*100+'%';
    e.style.top=Math.random()*100+'%';
    e.style.animationDelay=Math.random()*3+'s';
    s.appendChild(e);
  }
</script>
</body>
</html>
