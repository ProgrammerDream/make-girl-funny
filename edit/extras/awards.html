<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>awards</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100vw;height:100vh;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei',sans-serif;
    background:linear-gradient(135deg,#fce4ec 0%,#f3d4f0 50%,#e8d5f5 100%)}
  body{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:48px;padding:80px}

  h1{
    font-size:96px;font-weight:900;color:#d4607e;letter-spacing:8px;
    text-shadow:0 6px 20px rgba(180,100,140,.25);
    opacity:0;animation:fadeUp .35s ease 0s forwards
  }
  h1 small{display:block;font-size:36px;color:#9b7d8b;font-weight:500;margin-top:12px;letter-spacing:14px}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;width:100%}
  .card{
    background:rgba(255,255,255,.78);backdrop-filter:blur(20px);
    border:3px solid rgba(255,255,255,.6);border-radius:36px;
    padding:48px 40px;text-align:center;
    box-shadow:0 20px 60px rgba(180,100,140,.18);
    opacity:0;transform:translateY(40px) scale(.92);
    animation:pop .4s cubic-bezier(.34,1.56,.64,1) forwards
  }
  .card:nth-child(1){animation-delay:.25s}
  .card:nth-child(2){animation-delay:.45s}
  .card:nth-child(3){animation-delay:.65s}
  .card:nth-child(4){animation-delay:.85s}

  .card .icon{font-size:120px;line-height:1;margin-bottom:18px}
  .card .label{font-size:42px;color:#9b7d8b;font-weight:700;letter-spacing:4px;margin-bottom:14px}
  .card .model{font-size:56px;color:#d4607e;font-weight:900;letter-spacing:2px}

  .outro{
    margin-top:28px;font-size:48px;color:#73356d;font-weight:700;letter-spacing:4px;
    padding:24px 50px;background:rgba(255,255,255,.6);border-radius:999px;
    opacity:0;animation:fadeUp .4s ease 1.2s forwards
  }

  @keyframes fadeUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pop{to{opacity:1;transform:translateY(0) scale(1)}}
</style>
</head>
<body>
<h1>我的私心榜<small>这 10 个里我最爱</small></h1>
<div class="grid" id="grid"></div>
<div class="outro" id="outro">你最想试哪个？评论区告诉我 ❤</div>
<script>
  // 内容由 build 时通过 query 注入；默认值兜底
  const params=new URLSearchParams(location.search);
  const data=params.get('d');
  let items=[
    {icon:'🏆',label:'最走心',model:'Kimi 2.6'},
    {icon:'🎨',label:'最氛围感',model:'GLM 5.1'},
    {icon:'💀',label:'最油',model:'豆包'},
    {icon:'🥇',label:'综合最强',model:'Claude 4.7'}
  ];
  if(data){try{items=JSON.parse(decodeURIComponent(data))}catch(e){}}
  const g=document.getElementById('grid');
  items.forEach(it=>{
    const c=document.createElement('div');
    c.className='card';
    c.innerHTML=`<div class="icon">${it.icon}</div><div class="label">${it.label}</div><div class="model">${it.model}</div>`;
    g.appendChild(c);
  });
</script>
</body>
</html>
